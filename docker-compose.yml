services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: mmr-backend
    env_file: .env
    environment:
      # Match the in-container data layout. Override DB_PATH /
      # PROCESSED_DIR / UPLOAD_DIR through `.env` if you want different
      # absolute paths.
      DATA_ROOT: /app/data
      UPLOAD_DIR: /app/data/uploads
      PROCESSED_DIR: /app/data/processed
      DB_PATH: /app/data/mmr.db
      FACE_LANDMARKER_PATH: /app/models/face_landmarker.task
      # CORS for the dev frontend served by nginx on port 5173
      CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
    volumes:
      - ./data:/app/data
      - ./models:/app/models:ro
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        # Same-origin /api routing through nginx; override if backend is
        # exposed on a different host.
        VITE_API_BASE_URL: ""
    container_name: mmr-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
