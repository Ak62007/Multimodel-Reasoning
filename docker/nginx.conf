server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Single-page-app fallback: any unknown route falls back to index.html
    # so client-side routes like /analyzing/:id load on direct navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy /api/* to the backend container.
    # Override the upstream via the BACKEND_HOST env if you front this
    # container with something else.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 600M;
    }

    # Tiny cache for static assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
