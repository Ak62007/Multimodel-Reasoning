# Serves the Vite-built SPA + proxies /api to the backend.

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Upload-size headroom for POST /api/jobs (videos).
    #
    # The backend enforces the real cap via MAX_UPLOAD_MB (default 500 MB)
    # and returns its own 413 with a structured detail. nginx's default
    # client_max_body_size is just 1 MB, which would 413 the request here
    # before the backend ever sees it — so set this generously above the
    # backend default. Keep it in sync with the Caddy request_body
    # max_size in DEPLOYMENT.md (600 MB).
    client_max_body_size 600M;
    # Slow / large uploads need a longer body-read timeout than the 60 s
    # default; 300 s comfortably covers a 500 MB upload on a 20 Mbps link.
    client_body_timeout  300s;

    # SPA fallback — every unknown path returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container.
    location /api/ {
        proxy_pass         http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        # Stream the request body straight to the backend rather than
        # buffering the whole upload in nginx first. Halves disk I/O for
        # multi-hundred-MB videos and lets the backend's 413 message
        # surface to the client instead of being masked by nginx.
        proxy_request_buffering off;
    }
}
